workflows:
  manualcam-ios:
    name: ManualCam iOS (Native AVFoundation)
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      # === 1. Deep clean ===
      - name: Flutter Clean
        script: |
          set -e
          flutter clean
          rm -rf ios/Pods ios/Podfile.lock ios/.symlinks build 2>/dev/null || true

      # === 2. Get packages ===
      - name: Flutter pub get
        script: |
          set -e
          flutter pub get

      # === 3. Add Swift files to Xcode project (kailangan ito kung wala kang Xcode local) ===
      - name: Add Swift Files to Xcode Project
        script: |
          set -e
          cd ios

          # Install xcodeproj gem (kung wala pa)
          if ! gem list -i xcodeproj > /dev/null 2>&1; then
            sudo gem install xcodeproj --no-document
          fi

          # Ruby script para mag-add ng CameraManager.swift at CameraPreviewView.swift sa Runner target
          ruby <<'EOF'
          require 'xcodeproj'

          project_path = 'Runner.xcodeproj'
          project = Xcodeproj::Project.open(project_path)
          target = project.targets.find { |t| t.name == 'Runner' }
          runner_group = project.main_group['Runner']

          files_to_add = ['CameraManager.swift', 'CameraPreviewView.swift']

          files_to_add.each do |filename|
            file_path = "Runner/#{filename}"

            # Skip if already in project
            existing = runner_group.files.find { |f| f.path == filename }
            if existing
              puts "✓ #{filename} already in project"
              next
            end

            # Verify file exists on disk
            unless File.exist?(file_path)
              puts "✗ #{file_path} does not exist on disk!"
              exit 1
            end

            # Add file reference to Runner group
            file_ref = runner_group.new_reference(filename)

            # Add to Runner target's source build phase
            target.source_build_phase.add_file_reference(file_ref)

            puts "✓ Added #{filename} to Runner target"
          end

          project.save
          puts "✅ Xcode project updated"
          EOF

          cd ..

      # === 4. Generate iOS build settings ===
      - name: Generate iOS Build Config
        script: |
          set -e
          flutter build ios --release --no-codesign --config-only

      # === 5. Install CocoaPods ===
      - name: Pod Install
        script: |
          set -e
          cd ios
          pod install --repo-update
          cd ..

      # === 6. Build unsigned .app ===
      - name: Build Unsigned iOS App
        script: |
          set -e
          flutter build ios --release --no-codesign --verbose

      # === 7. Manually package .app into .ipa ===
      - name: Package into IPA
        script: |
          set -e

          APP_PATH=""
          if [ -d "build/ios/iphoneos/Runner.app" ]; then
            APP_PATH="build/ios/iphoneos/Runner.app"
          elif [ -d "build/ios/archive/Runner.xcarchive/Products/Applications/Runner.app" ]; then
            APP_PATH="build/ios/archive/Runner.xcarchive/Products/Applications/Runner.app"
          elif [ -d "build/ios/Release-iphoneos/Runner.app" ]; then
            APP_PATH="build/ios/Release-iphoneos/Runner.app"
          fi

          if [ -z "$APP_PATH" ]; then
            echo "❌ Runner.app not found!"
            find build/ios -name "Runner.app" -type d 2>/dev/null || true
            exit 1
          fi

          echo "✅ Found Runner.app at: $APP_PATH"
          du -sh "$APP_PATH"

          mkdir -p build/ios/ipa
          rm -rf Payload
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -qr build/ios/ipa/manual_cam.ipa Payload
          rm -rf Payload

          SIZE=$(ls -lh build/ios/ipa/manual_cam.ipa | awk '{print $5}')
          echo "✅ IPA created: manual_cam.ipa ($SIZE)"
          ls -lh build/ios/ipa/

    artifacts:
      - build/ios/ipa/*.ipa
