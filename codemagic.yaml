workflows:
  manualcam-ios:
    name: ManualCam iOS (Unsigned IPA for Sideloadly)
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      # === 1. Deep clean ===
      - name: Flutter Clean
        script: |
          set -e
          flutter clean
          rm -rf ios/Pods ios/Podfile.lock ios/.symlinks build 2>/dev/null || true

      # === 2. Get packages ===
      - name: Flutter pub get
        script: |
          set -e
          flutter pub get

      # === 3. Generate iOS build settings ===
      - name: Generate iOS Build Config
        script: |
          set -e
          flutter build ios --release --no-codesign --config-only

      # === 4. Install CocoaPods ===
      - name: Pod Install
        script: |
          set -e
          cd ios
          pod install --repo-update
          cd ..

      # === 5. Build unsigned .app ===
      - name: Build Unsigned iOS App
        script: |
          set -e
          flutter build ios --release --no-codesign --verbose

      # === 6. Manually package .app into .ipa ===
      - name: Package into IPA
        script: |
          set -e

          # Hanapin yung .app — puwedeng nasa dalawang lugar
          APP_PATH=""
          if [ -d "build/ios/iphoneos/Runner.app" ]; then
            APP_PATH="build/ios/iphoneos/Runner.app"
          elif [ -d "build/ios/archive/Runner.xcarchive/Products/Applications/Runner.app" ]; then
            APP_PATH="build/ios/archive/Runner.xcarchive/Products/Applications/Runner.app"
          elif [ -d "build/ios/Release-iphoneos/Runner.app" ]; then
            APP_PATH="build/ios/Release-iphoneos/Runner.app"
          fi

          if [ -z "$APP_PATH" ]; then
            echo "❌ Runner.app not found in any expected location!"
            echo "Contents of build/ios/:"
            find build/ios -name "Runner.app" -type d 2>/dev/null || true
            ls -la build/ios/ 2>/dev/null || true
            exit 1
          fi

          echo "✅ Found Runner.app at: $APP_PATH"
          du -sh "$APP_PATH"

          # Create IPA
          mkdir -p build/ios/ipa
          rm -rf Payload
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/

          zip -qr build/ios/ipa/manual_cam.ipa Payload
          rm -rf Payload

          if [ ! -f "build/ios/ipa/manual_cam.ipa" ]; then
            echo "❌ IPA creation failed"
            exit 1
          fi

          SIZE=$(ls -lh build/ios/ipa/manual_cam.ipa | awk '{print $5}')
          echo "✅ IPA created successfully: manual_cam.ipa ($SIZE)"
          ls -lh build/ios/ipa/

    artifacts:
      - build/ios/ipa/*.ipa
