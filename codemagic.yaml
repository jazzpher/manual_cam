workflows:
  manualcam-ios:
    name: ManualCam iOS (Real Camera)
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
    scripts:
      # === 1. Deep clean (very important pag may bagong plugin) ===
      - name: Flutter Clean
        script: |
          flutter clean
          rm -rf ios/Pods ios/Podfile.lock ios/.symlinks 2>/dev/null || true

      # === 2. Get packages ===
      - name: Flutter pub get
        script: |
          flutter pub get

      # === 3. Generate iOS build settings (CRITICAL - dapat bago ang pod install) ===
      - name: Generate iOS Build Config
        script: |
          flutter build ios --release --no-codesign --config-only

      # === 4. Install CocoaPods ===
      - name: Pod Install
        script: |
          cd ios
          pod repo update
          pod install --repo-update
          cd ..

      # === 5. Build Unsigned IPA (para sa Sideloadly) ===
      - name: Build Unsigned IPA
        script: |
          flutter build ipa --release --no-codesign --verbose
          echo "✅ IPA created successfully"

    artifacts:
      - build/ios/ipa/*.ipa